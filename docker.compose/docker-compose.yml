networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  # 1. Target Application
  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: observability-app
    command:
      [
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "3000",
        "--workers",
        "4",
        "--log-level",
        "warning",
      ]
    ports:
      - "3000:3000"
    networks:
      - monitoring-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. Node Exporter (Application Node Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 3. Prometheus Service
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      app:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 4. Grafana Service
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3001:3000" # Expose di 3001 karena 3000 dipakai app
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring-network
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
