---
- name: Deploy Application via Docker Compose
  hosts: app_nodes
  become: true
  gather_facts: true

  vars:
    app_name: fastapi-app
    app_port: 3000
    compose_dir: /opt/{{ app_name }}

  tasks:
    # ==========================================
    # Create Application Directory
    # ==========================================
    - name: Create application directory
      file:
        path: "{{ compose_dir }}"
        state: directory
        mode: '0755'
      tags:
        - deploy
        - setup

    # ==========================================
    # Copy Docker Compose File
    # ==========================================
    - name: Copy docker-compose.yml to remote
      copy:
        src: ../docker-compose.yml
        dest: "{{ compose_dir }}/docker-compose.yml"
        mode: '0644'
      register: compose_copy
      tags:
        - deploy
        - compose-copy

    - name: Copy application source
      synchronize:
        src: ../app/
        dest: "{{ compose_dir }}/app"
        delete: yes
        recursive: yes
      tags:
        - deploy
        - app-copy

    # ==========================================
    # Deploy with Docker Compose
    # ==========================================
    - name: Pull latest images
      docker_compose:
        project_src: "{{ compose_dir }}"
        pull: yes
      tags:
        - deploy
        - compose-up

    - name: Start application services
      docker_compose:
        project_src: "{{ compose_dir }}"
        state: present
      register: compose_result
      tags:
        - deploy
        - compose-up

    - name: Display deployment status
      debug:
        msg: "Docker Compose services started successfully at {{ compose_dir }}"
      tags:
        - deploy
        - compose-up

    # ==========================================
    # Validation
    # ==========================================
    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        delay: 2
        timeout: 30
      tags:
        - validate

    - name: Check application health
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 3
      delay: 2
      until: health_check.status == 200
      tags:
        - validate

    - name: Display validation result
      debug:
        msg: "✓ Application {{ app_name }} is running and healthy on port {{ app_port }}"
      tags:
        - validate