# ==========================================
# Managed by: Person 4 - Ansible Specialist
# Description: Install Docker dan dependencies pada app node
# ==========================================

---
- name: Install Docker dan Dependencies pada App Nodes
  hosts: app_nodes
  become: true
  gather_facts: true

  tasks:
    # ==========================================
    # Update APT Cache
    # ==========================================
    - name: Update APT cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags:
        - system
        - update

    # ==========================================
    # Install Prerequisites
    # ==========================================
    - name: Install prerequisites packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
          - software-properties-common
        state: present
      tags:
        - dependencies
        - docker-prep

    # ==========================================
    # Setup Docker Repository
    # ==========================================
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /usr/share/keyrings/docker-archive-keyring.gpg
      tags:
        - docker-setup
        - docker-repo

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      tags:
        - docker-setup
        - docker-repo

    # ==========================================
    # Install Docker
    # ==========================================
    - name: Update APT cache after adding Docker repo
      apt:
        update_cache: yes
      tags:
        - docker
        - docker-install

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      tags:
        - docker
        - docker-install

    # ==========================================
    # Enable Docker Service
    # ==========================================
    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
      tags:
        - docker
        - docker-service

    # ==========================================
    # Docker User Configuration
    # ==========================================
    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
      tags:
        - docker
        - docker-user

    # ==========================================
    # Firewall Configuration (UFW)
    # ==========================================
    - name: Enable UFW firewall
      ufw:
        state: enabled
        policy: deny
        direction: incoming
      tags:
        - firewall
        - ufw

    - name: Allow SSH traffic
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      tags:
        - firewall
        - ufw
        - ssh

    - name: Allow application port (3000)
      ufw:
        rule: allow
        port: "3000"
        proto: tcp
      tags:
        - firewall
        - ufw
        - app

    - name: Allow node_exporter metrics port (9100)
      ufw:
        rule: allow
        port: "9100"
        proto: tcp
      tags:
        - firewall
        - ufw
        - monitoring

    # ==========================================
    # Verification
    # ==========================================
    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false
      tags:
        - verify
        - docker

    - name: Display Docker version
      debug:
        msg: "{{ docker_version.stdout }}"
      tags:
        - verify
        - docker