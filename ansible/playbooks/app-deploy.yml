# ==========================================
# Managed by: Person 4 - Ansible Specialist
# Description: Deployment aplikasi FastAPI menggunakan Docker
# ==========================================

---
- name: Deploy FastAPI Application via Docker
  hosts: app_nodes
  become: true
  gather_facts: true

  vars:
    app_name: fastapi-app
    app_port: 3000
    docker_registry_url: "{{ ansible_host }}"
    container_name: "{{ app_name }}"
    image_name: "{{ app_name }}:latest"

  tasks:
    # ==========================================
    # Copy Application Source
    # ==========================================
    - name: Copy application source to remote
      synchronize:
        src: "../app/"
        dest: "/tmp/{{ app_name }}"
        delete: yes
        recursive: yes
      tags:
        - deploy
        - app-copy

    # ==========================================
    # Build Docker Image
    # ==========================================
    - name: Build Docker image
      docker_image:
        name: "{{ image_name }}"
        build:
          path: "/tmp/{{ app_name }}"
          dockerfile: Dockerfile
        source: build
        state: present
      register: docker_build_result
      tags:
        - deploy
        - docker-build

    - name: Display build result
      debug:
        msg: "Docker image built successfully: {{ image_name }}"
      tags:
        - deploy
        - docker-build

    # ==========================================
    # Stop & Remove Existing Container
    # ==========================================
    - name: Stop existing container
      docker_container:
        name: "{{ container_name }}"
        state: stopped
      ignore_errors: yes
      tags:
        - deploy
        - docker-run

    - name: Remove existing container
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes
      tags:
        - deploy
        - docker-run

    # ==========================================
    # Deploy Application Container
    # ==========================================
    - name: Run application container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:8000"
        env:
          LOG_LEVEL: info
        networks:
          - name: bridge
        pull: no
      register: container_result
      tags:
        - deploy
        - docker-run

    - name: Display container info
      debug:
        msg: "Container {{ container_name }} deployed on port {{ app_port }}"
      tags:
        - deploy
        - docker-run

    # ==========================================
    # Validation Block
    # ==========================================
    - name: Validate application deployment
      block:
        - name: Wait for container to be ready
          wait_for:
            port: "{{ app_port }}"
            delay: 2
            timeout: 30
          tags:
            - validate

        - name: Check container running status
          docker_container_info:
            name: "{{ container_name }}"
          register: container_info
          tags:
            - validate

        - name: Verify container is running
          assert:
            that:
              - container_info.exists
              - container_info.container.State.Running
            fail_msg: "Container is not running"
          tags:
            - validate

        - name: Check /health endpoint
          uri:
            url: "http://localhost:{{ app_port }}/health"
            method: GET
            status_code: 200
          register: health_check
          retries: 3
          delay: 2
          until: health_check.status == 200
          tags:
            - validate
            - health-check

        - name: Check /metrics endpoint
          uri:
            url: "http://localhost:{{ app_port }}/metrics"
            method: GET
            status_code: 200
          register: metrics_check
          retries: 3
          delay: 2
          until: metrics_check.status == 200
          tags:
            - validate
            - metrics-check

        - name: Display validation results
          debug:
            msg: |
              ✓ Container: {{ container_info.container.Name }}
              ✓ Status: {{ container_info.container.State.Status }}
              ✓ Health: OK
              ✓ Metrics: OK
          tags:
            - validate

      rescue:
        - name: Display deployment error
          debug:
            msg: "Deployment validation failed - please check logs"
          tags:
            - validate

        - name: Show container logs
          command: "docker logs {{ container_name }}"
          register: container_logs
          tags:
            - validate

        - name: Display container logs
          debug:
            msg: "{{ container_logs.stdout }}"
          tags:
            - validate

        - name: Fail playbook
          fail:
            msg: "Application deployment validation failed"
          tags:
            - validate