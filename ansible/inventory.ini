; Description: Inventory untuk mengelompokkan app node dan monitoring node
; ==========================================

[app_nodes]
app-1 ansible_host=YOUR_APP_IP

[monitoring_nodes]
monitoring-1 ansible_host=YOUR_MONITORING_IP


[all:vars]
ansible_user=ubuntu
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_timeout=30
ansible_connection=ssh
cloud_provider=azure
vm_os=ubuntu


[app_nodes:vars]
node_type=application
app_port=3000
node_exporter_port=9100
app_metrics_path=/metrics
docker_enabled=true
docker_restart_policy=unless-stopped
log_driver=json-file


[monitoring_nodes:vars]
node_type=monitoring
prometheus_port=9090
prometheus_scrape_interval=15s
prometheus_retention_time=30d
alertmanager_port=9093
backup_enabled=true
docker_enabled=true
docker_restart_policy=unless-stopped
log_driver=json-file


[docker_hosts:children]
app_nodes
monitoring_nodes

[all_vms:children]
app_nodes
monitoring_nodes
