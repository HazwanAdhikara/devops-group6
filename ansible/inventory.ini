# Ansible Inventory for DevOps Monitoring Stack
# Person 5 - Monitoring System
# Last Updated: 2026-04-21

# Monitoring nodes (Prometheus + Alertmanager)
[monitoring_nodes]
monitoring-1 ansible_host=<MONITORING_NODE_IP> ansible_user=ubuntu ansible_port=22

# Application nodes (App + Node Exporter)
[app_nodes]
app-1 ansible_host=10.0.1.4 ansible_user=ubuntu ansible_port=22

# All nodes
[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Monitoring group variables
[monitoring_nodes:vars]
node_type=monitoring
prometheus_port=9090
alertmanager_port=9093

# Application group variables
[app_nodes:vars]
node_type=application
app_port=3000
node_exporter_port=9100
