# Prometheus Configuration for DevOps Monitoring Stack
# Person 5 - Monitoring System
# Last Updated: 2026-04-21

# Global Configuration
global:
  scrape_interval: 15s          # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s      # Evaluate rules every 15 seconds
  external_labels:
    monitor: 'devops-monitoring'
    environment: 'production'

# Alertmanager Configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093     # Alertmanager runs on port 9093

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/alerting-rules.yml'

# Scrape Configurations
scrape_configs:
  # Job 1: Prometheus itself (self-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 10s
    scrape_timeout: 5s

  # Job 2: Application Metrics
  - job_name: 'app'
    static_configs:
      - targets: ['10.0.1.4:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Job 3: Node Exporter (Application Node)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.1.4:9100']
    scrape_interval: 15s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Job 4: Alertmanager (optional - for alertmanager metrics)
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']
    scrape_interval: 15s
    scrape_timeout: 5s
